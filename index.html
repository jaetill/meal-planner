<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="./src/js/app.js"></script>
</head>
<body class="min-h-screen bg-surface">

  <header class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-green-700">🥗 Meal Planner</h1>
    <button id="sign-out-btn" class="btn btn-ghost text-xs">Sign out</button>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">
    <div id="app-content">
      <p class="text-gray-400 text-sm text-center py-12">Loading…</p>
    </div>
  </main>

  <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

</body>
</html>
