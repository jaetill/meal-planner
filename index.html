<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner</title>
  <link rel="stylesheet" href="style.css" />
  <script>globalThis.global = globalThis;</script>
  <script type="module" src="./src/js/app.js"></script>
</head>
<body class="min-h-screen bg-surface">

  <header class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-green-700">🥗 Meal Planner</h1>
    <button id="sign-out-btn" class="btn btn-ghost text-xs">Sign out</button>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 pb-24">
    <div id="app-content">
      <p class="text-gray-400 text-sm text-center py-12">Loading…</p>
    </div>
  </main>

  <nav class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-100 flex z-30">
    <button id="nav-recipes" type="button" class="flex-1 flex flex-col items-center py-2 text-xs font-medium text-green-600 gap-0.5">
      <span class="text-lg">📋</span> Recipes
    </button>
    <button id="nav-mealplan" type="button" class="flex-1 flex flex-col items-center py-2 text-xs font-medium text-gray-400 gap-0.5">
      <span class="text-lg">📅</span> Meal Plan
    </button>
  </nav>

  <div id="toast-container" class="fixed bottom-20 right-4 flex flex-col gap-2 z-50"></div>

</body>
</html>
