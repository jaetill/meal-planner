<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner – Sign In</title>
  <script type="module" crossorigin src="/assets/login-C6sXZhKM.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/config-iXHKShf4.js">
  <link rel="stylesheet" crossorigin href="/assets/config--h2c_qIz.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-green-50 to-emerald-100">

  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🥗</div>
      <h1 class="text-2xl font-bold text-gray-900">Meal Planner</h1>
      <p class="text-gray-500 mt-1 text-sm">Sign in to plan your week</p>
    </div>

    <form id="login-form" class="space-y-4" novalidate>
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="username" type="text" required autocomplete="username"
               class="field" placeholder="your username">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="field" placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full py-2 text-base mt-2">
        Sign In
      </button>
      <p class="text-center">
        <button type="button" id="forgot-link" class="text-sm text-green-700 hover:underline">
          Forgot password?
        </button>
      </p>
    </form>

    <form id="forgot-form" class="space-y-4 hidden" novalidate>
      <p class="text-sm text-gray-600">Enter your username and we'll send a reset code to your email.</p>
      <div>
        <label for="forgot-username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="forgot-username" type="text" required autocomplete="username"
               class="field" placeholder="your username">
      </div>
      <button type="submit" id="forgot-btn" class="btn btn-primary w-full py-2 text-base">
        Send reset code
      </button>
      <p class="text-center">
        <button type="button" id="back-to-login" class="text-sm text-green-700 hover:underline">
          Back to sign in
        </button>
      </p>
    </form>

    <form id="reset-form" class="space-y-4 hidden" novalidate>
      <p class="text-sm text-gray-600">Check your email for the reset code.</p>
      <div>
        <label for="reset-code" class="block text-sm font-medium text-gray-700 mb-1">Reset code</label>
        <input id="reset-code" type="text" required autocomplete="one-time-code"
               class="field" placeholder="123456">
      </div>
      <div>
        <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
        <input id="new-password" type="password" required autocomplete="new-password"
               class="field" placeholder="••••••••">
      </div>
      <button type="submit" id="reset-btn" class="btn btn-primary w-full py-2 text-base">
        Set new password
      </button>
    </form>

    <p id="error" class="mt-4 text-sm text-red-600 text-center hidden"></p>
  </div>

</body>
</html>
